name: Deploy landing

# Builds the Next.js landing site (static export) and deploys it to
# Cloudflare Workers as static assets. Runs on pushes to main that touch
# landing/, and can be triggered manually.
on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - run: npm ci

      - run: npm run build # output: "export" writes ./out

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: landing
          command: deploy
