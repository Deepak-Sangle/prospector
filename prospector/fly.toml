# Fly.io config for the Prospector Slack agent.
# Deploy with `fly deploy` (from this dir). Secrets are NOT set here — use
# `fly secrets set KEY=value` (see the deploy notes). Change `app` and
# `primary_region` to match your account before the first deploy.
app = "prospector"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

# Run Prisma migrations against DATABASE_URL on each release, before the
# new machines start serving.
[deploy]
  release_command = "npx prisma migrate deploy"

[http_service]
  internal_port = 3000
  force_https = true
  # The app receives Slack events and runs an in-process cron scheduler, so it
  # must stay running — do not scale to zero.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
